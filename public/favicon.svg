<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bgCode" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1117"/>
      <stop offset="100%" style="stop-color:#1a1d2e"/>
    </linearGradient>
    <linearGradient id="dollarGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#60efff"/>
      <stop offset="100%" style="stop-color:#0061ff"/>
    </linearGradient>
    <filter id="glow3" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="64" height="64" rx="11" fill="url(#bgCode)"/>

  <!-- Subtle scanline texture rows -->
  <rect x="0" y="0" width="64" height="1" fill="#ffffff" opacity="0.015"/>
  <rect x="0" y="4" width="64" height="1" fill="#ffffff" opacity="0.015"/>
  <rect x="0" y="8" width="64" height="1" fill="#ffffff" opacity="0.015"/>
  <rect x="0" y="12" width="64" height="1" fill="#ffffff" opacity="0.015"/>
  <rect x="0" y="16" width="64" height="1" fill="#ffffff" opacity="0.015"/>
  <rect x="0" y="20" width="64" height="1" fill="#ffffff" opacity="0.015"/>
  <rect x="0" y="24" width="64" height="1" fill="#ffffff" opacity="0.015"/>
  <rect x="0" y="28" width="64" height="1" fill="#ffffff" opacity="0.015"/>
  <rect x="0" y="32" width="64" height="1" fill="#ffffff" opacity="0.015"/>
  <rect x="0" y="36" width="64" height="1" fill="#ffffff" opacity="0.015"/>
  <rect x="0" y="40" width="64" height="1" fill="#ffffff" opacity="0.015"/>
  <rect x="0" y="44" width="64" height="1" fill="#ffffff" opacity="0.015"/>
  <rect x="0" y="48" width="64" height="1" fill="#ffffff" opacity="0.015"/>
  <rect x="0" y="52" width="64" height="1" fill="#ffffff" opacity="0.015"/>
  <rect x="0" y="56" width="64" height="1" fill="#ffffff" opacity="0.015"/>
  <rect x="0" y="60" width="64" height="1" fill="#ffffff" opacity="0.015"/>

  <!-- Left curly brace { -->
  <g filter="url(#glow3)" opacity="0.9">
    <path d="M 18 14
             C 13 14 12 17 12 20
             L 12 27
             C 12 30 10 31 8 32
             C 10 33 12 34 12 37
             L 12 44
             C 12 47 13 50 18 50"
          fill="none" stroke="#60efff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Right curly brace } -->
  <g filter="url(#glow3)" opacity="0.9">
    <path d="M 46 14
             C 51 14 52 17 52 20
             L 52 27
             C 52 30 54 31 56 32
             C 54 33 52 34 52 37
             L 52 44
             C 52 47 51 50 46 50"
          fill="none" stroke="#60efff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Dollar sign — centred, gradient white-blue -->
  <g filter="url(#glow3)">
    <!-- Vertical bar -->
    <line x1="32" y1="13" x2="32" y2="51" stroke="url(#dollarGrad)" stroke-width="2.8" stroke-linecap="round"/>

    <!-- S shape -->
    <path d="M 40 22 C 40 17 24 17 24 24 C 24 30 40 30 40 38 C 40 44 24 44 24 39"
          fill="none" stroke="url(#dollarGrad)" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
